<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Special Project Branch</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --sea-green: #3eb489;
      --sea-green-dark: #2a9070;
      --sea-green-light: #6dcfaa;
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --card-bg: rgba(255, 255, 255, 0.72);
      --card-border: rgba(255, 255, 255, 0.9);
      --shadow-soft: 0 4px 24px rgba(62, 180, 137, 0.10);
      --shadow-hover: 0 12px 40px rgba(62, 180, 137, 0.22);
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #ffffff 0%, #e8f8f2 35%, #b2e8d4 68%, #3eb489 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 60px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── HEADER ─────────────────────────────────── */
    .site-header {
      text-align: center;
      padding: 80px 20px 56px;
      width: 100%;
    }

    .site-title {
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1.1;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a9070 60%, #3eb489 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }

    .site-subtitle {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ─── GRID ───────────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 1000px;
    }

    /* ─── CARD ───────────────────────────────────── */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow-soft);
      transition:
        transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.28s ease,
        background 0.22s ease,
        border-color 0.22s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.55) 0%, rgba(62,180,137,0.06) 100%);
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.28s ease;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.012);
      box-shadow: var(--shadow-hover);
      border-color: rgba(62, 180, 137, 0.45);
      background: rgba(255, 255, 255, 0.88);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card:active {
      transform: translateY(-2px) scale(1.004);
    }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #3eb489 0%, #2a9070 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(62, 180, 137, 0.30);
    }

    .card-icon svg {
      width: 22px;
      height: 22px;
      fill: #fff;
    }

    .card-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      line-height: 1.3;
      position: relative;
    }

    .card-cta {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--sea-green-dark);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
      opacity: 0.82;
      transition: opacity 0.2s, gap 0.2s;
      position: relative;
    }

    .card:hover .card-cta {
      opacity: 1;
      gap: 8px;
    }

    .card-cta svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.2s ease;
    }

    .card:hover .card-cta svg {
      transform: translateX(2px);
    }

    /* ─── FOOTER ─────────────────────────────────── */
    .site-footer {
      margin-top: auto;
      padding-top: 64px;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 400;
      color: rgba(0, 0, 0, 0.35);
      letter-spacing: 0.02em;
    }

    /* ─── RESPONSIVE ─────────────────────────────── */
    @media (max-width: 540px) {
      .site-header {
        padding: 56px 12px 40px;
      }
      .cards-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <h1 class="site-title">Special Project Branch</h1>
    <p class="site-subtitle">Strumenti &amp; Risorse</p>
  </header>

  <main class="cards-grid">

    <!-- CARD: Incentivi Top -->

      target="_blank"
      rel="noopener noreferrer"
    >
      <div class="card-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
        </svg>
      </div>
      <span class="card-name">Incentivi Top</span>
      <span class="card-cta">
        Apri strumento
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>

    <!-- Aggiungere nuove card qui, in ordine alfabetico -->

  </main>

  <footer class="site-footer">
    By Nazzareno La Manna &mdash; 2025
  </footer>

</body>
</html>
